function useLocalStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try {
      const saved = localStorage.getItem(key);
      return saved !== null ? JSON.parse(saved) : defaultValue;
    } catch { return defaultValue; }
  });
  const setAndSave = (newVal) => {
    setValue(prev => {
      const resolved = typeof newVal === "function" ? newVal(prev) : newVal;
      try { localStorage.setItem(key, JSON.stringify(resolved)); } catch {}
      return resolved;
    });
  };
  return [value, setAndSave];
}

    setReceiptScanning(true);
    setReceiptError("");
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: imageBase64 }
              },
              {
                type: "text",
                text: `このレシートを読み取って、購入品目ごとに以下のカテゴリに分類してください。
カテゴリ一覧: food(食費), daily(日用品), transport(交通費), utility(光熱費), entertainment(娯楽), health(医療・健康), other(その他)

必ずJSON配列のみで返してください。説明文や\`\`\`は不要です。
形式: [{"note":"品名","amount":金額,"category":"カテゴリID"},...]
レシートの合計金額ではなく、各品目を個別に返してください。`
              }
            ]
          }]
        })
      });
      const data = await response.json();
      const text = data.content?.[0]?.text || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const items = JSON.parse(clean);
      setReceiptResults(items.map((item, i) => ({
        ...item,
        id: Date.now() + i,
        date: today.toISOString().split("T")[0],
        selected: true,
      })));
    } catch (e) {
      setReceiptError("読み取りに失敗しました。レシートをもっと明るく・まっすぐ撮影してもう一度お試しください。");
    }
    setReceiptScanning(false);
  };

  const handleReceiptImage = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const base64 = ev.target.result.split(",")[1];
      setReceiptImage(ev.target.result);
      scanReceipt(base64);
    };
    reader.readAsDataURL(file);
  };

  const addReceiptExpenses = () => {

    setExpenses([...expenses, ...selected.map(r => ({ id: r.id, date: r.date, category: r.category, amount: r.amount, note: r.note }))]);

    setReceiptImage(null);
    setReceiptMode(false);
  };

  const totalSpent = expenses.reduce((s, e) => s + e.amount, 0);
  const totalBudget = Object.values(budgets).reduce((s, v) => s + v, 0);
  const totalFixed = fixedExpenses.reduce((s, f) => s + f.amount, 0);
  const unpaidFixed = fixedExpenses.filter(f => !f.isPaid).reduce((s, f) => s + f.amount, 0);
  const paidFixed = fixedExpenses.filter(f => f.isPaid).reduce((s, f) => s + f.amount, 0);

  const MONTHLY_INCOME_FOOD = 96000;    // 夫からの食費
  const MONTHLY_INCOME = MONTHLY_INCOME_SELF + MONTHLY_INCOME_FOOD; // 合計296,000円
  const SAVINGS_GOAL = 500000;
  const MONTHS_LEFT = 12 - today.getMonth();
  const monthlySavingsNeeded = Math.ceil(SAVINGS_GOAL / MONTHS_LEFT);
  const totalMonthlyOut = totalFixed + totalBudget;
  const monthlySurplus = MONTHLY_INCOME - totalMonthlyOut;

  const spentByCategory = Object.fromEntries(
    CATEGORIES.map(c => [c.id, expenses.filter(e => e.category === c.id).reduce((s, e) => s + e.amount, 0)])
  );

  const dailyAvg = dayOfMonth > 0 ? totalSpent / dayOfMonth : 0;
  const projectedTotal = dailyAvg * daysInMonth;
  const remainingDays = daysInMonth - dayOfMonth;
  const remainingBudget = totalBudget - totalSpent;
  const todayBudget = remainingDays > 0 ? Math.floor(remainingBudget / remainingDays) : 0;
  const totalBalance = Object.values(balances).reduce((s, v) => s + v, 0);
  const LOW_BALANCE_THRESHOLD = 30000;

  const alertItems = inventory.filter(i => i.quantity <= i.minAlert);

  const spentByCategory2 = Object.fromEntries(
    CATEGORIES.map(c => [c.id, expenses.filter(e => e.category === c.id).reduce((s, e) => s + e.amount, 0)])
  );

  const alerts = [];
  if (totalSpent > totalBudget) {
    alerts.push({ level: "danger", icon: "🚨", msg: `変動費が予算を¥${(totalSpent - totalBudget).toLocaleString("ja-JP")}オーバー！` });
  } else if (totalSpent > totalBudget * 0.8) {
    alerts.push({ level: "warn", icon: "⚠️", msg: `変動費が予算の${Math.round(totalSpent/totalBudget*100)}%に達しています` });
  }
  if (projectedTotal > totalBudget) {
    alerts.push({ level: "warn", icon: "📈", msg: `このペースだと月末に¥${Math.round(projectedTotal - totalBudget).toLocaleString("ja-JP")}超過の見込み` });
  }
  CATEGORIES.forEach(cat => {
    const spent = spentByCategory2[cat.id] || 0;
    const budget = budgets[cat.id];
    if (spent > budget) {

    }

    alerts.push({ level: "danger", icon: "💸", msg: `総残高¥${totalBalance.toLocaleString("ja-JP")}が少なくなっています！` });

          {ACCOUNTS.map(acc => {
            const bal = balances[acc.id];
            const isEditing = editingBalance === acc.id;
            const hist = balanceHistory.find(h => h.accountId === acc.id);
            const diff = hist ? bal - hist.prevAmount : null;
            return (
              <div key={acc.id} style={{ padding: "12px 0", borderBottom: "1px solid #2A2D3E" }}>
                <div style={styles.row}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: `${acc.color}22`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>
                      {acc.icon}
                    </div>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{acc.label}</div>
                      {hist && diff !== 0 && diff !== null && (
                        <div style={{ fontSize: 11, color: diff > 0 ? "#34D399" : "#EF4444" }}>
                          {diff > 0 ? "▲" : "▼"} ¥{fmt(Math.abs(diff))} (前回比)
                        </div>
                      )}
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: "#E8E8F0" }}>¥{fmt(bal)}</div>
                    <button
                      onClick={() => { setEditingBalance(acc.id); setTempBalance(String(bal)); }}
                      style={{ fontSize: 11, color: "#7C3AED", background: "transparent", border: "none", cursor: "pointer", padding: 0, marginTop: 2 }}
                    >
                      ✏️ 更新
                    </button>
                  </div>
                </div>
                {isEditing && (
                  <div style={{ marginTop: 10, display: "flex", gap: 8 }}>
                    <input
                      type="number"
                      placeholder="残高を入力"
                      value={tempBalance}
                      onChange={e => setTempBalance(e.target.value)}
                      style={{ ...styles.input, marginBottom: 0, flex: 1 }}
                      autoFocus
                    />
                    <button onClick={() => updateBalance(acc.id, tempBalance)} style={{ ...styles.btn("primary"), padding: "10px 16px" }}>保存</button>
                    <button onClick={() => { setEditingBalance(null); setTempBalance(""); }} style={{ ...styles.btn("secondary"), padding: "10px 12px" }}>✕</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* 内訳バー */}
        <div style={styles.card}>
          <div style={styles.cardTitle}>📊 口座内訳</div>
          {ACCOUNTS.map(acc => {
            const bal = balances[acc.id];
            const ratio = totalBalance > 0 ? bal / totalBalance : 0;
            return (
              <div key={acc.id} style={{ marginBottom: 10 }}>
                <div style={{ ...styles.row, marginBottom: 4 }}>
                  <span style={{ fontSize: 12 }}>{acc.icon} {acc.label}</span>
                  <span style={{ fontSize: 12, fontWeight: 600 }}>¥{fmt(bal)} ({Math.round(ratio * 100)}%)</span>
                </div>
                <div style={styles.progressBar()}>
                  <div style={{ ...styles.progressFill(ratio, acc.color), background: `linear-gradient(90deg, ${acc.color}, ${acc.color}99)` }} />
                </div>
              </div>
            );
          })}
        </div>

        {/* 最終更新日時 */}
        {balanceHistory.length > 0 && (
          <div style={{ ...styles.card }}>
            <div style={styles.cardTitle}>🕐 更新履歴（直近5件）</div>
            {balanceHistory.slice(0, 5).map(h => {
              const acc = ACCOUNTS.find(a => a.id === h.accountId);
              const diff = h.amount - h.prevAmount;
              return (
                <div key={h.id} style={{ ...styles.row, padding: "6px 0", borderBottom: "1px solid #2A2D3E" }}>
                  <div style={{ fontSize: 13 }}>{acc?.icon} {acc?.label}</div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>¥{fmt(h.amount)}</div>
                    <div style={{ fontSize: 11, color: diff >= 0 ? "#34D399" : "#EF4444" }}>
                      {diff >= 0 ? "+" : ""}¥{fmt(diff)}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  const Inventory = () => (
    <div style={styles.content}>
      {showInventoryForm && (
        <div style={styles.card}>
          <div style={styles.cardTitle}>➕ 在庫を追加</div>
          <input type="text" placeholder="品名（例：米）" value={newItem.name} onChange={e => setNewItem({ ...newItem, name: e.target.value })} style={styles.input} />
          <input type="text" placeholder="単位（例：kg, 個, 本）" value={newItem.unit} onChange={e => setNewItem({ ...newItem, unit: e.target.value })} style={styles.input} />
          <input type="number" placeholder="現在の数量" value={newItem.quantity} onChange={e => setNewItem({ ...newItem, quantity: parseInt(e.target.value) || 0 })} style={styles.input} />
          <input type="number" placeholder="アラート数（この数以下で警告）" value={newItem.minAlert} onChange={e => setNewItem({ ...newItem, minAlert: parseInt(e.target.value) || 1 })} style={styles.input} />
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={addInventoryItem} style={{ ...styles.btn("primary"), flex: 1 }}>追加</button>
            <button onClick={() => setShowInventoryForm(false)} style={{ ...styles.btn("secondary"), flex: 1 }}>キャンセル</button>
          </div>
        </div>
      )}

      {alertItems.length > 0 && (
        <div style={{ ...styles.card, border: "1px solid #EF444455" }}>
          <div style={styles.cardTitle}>🚨 補充が必要なもの</div>
          {alertItems.map(item => (
            <div key={item.id} style={{ ...styles.row, padding: "6px 0" }}>
              <span style={{ fontSize: 14, fontWeight: 600 }}>{item.name}</span>
              <span style={styles.badge("#EF4444")}>残り{item.quantity}{item.unit}</span>
            </div>
          ))}
        </div>
      )}

      <div style={styles.card}>
        <div style={styles.cardTitle}>📦 在庫一覧</div>
        {inventory.map(item => (
          <div key={item.id} style={{ ...styles.row, padding: "10px 0", borderBottom: "1px solid #2A2D3E" }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 600 }}>{item.name}</div>
              <div style={{ fontSize: 11, color: "#6B7280" }}>アラート: {item.minAlert}{item.unit}以下</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button onClick={() => updateInventory(item.id, -1)} style={{ width: 28, height: 28, borderRadius: 8, border: "none", background: "#2A2D3E", color: "#E8E8F0", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
              <span style={{ fontSize: 16, fontWeight: 700, minWidth: 40, textAlign: "center", color: item.quantity <= item.minAlert ? "#EF4444" : "#E8E8F0" }}>
                {item.quantity}{item.unit}
              </span>
              <button onClick={() => updateInventory(item.id, 1)} style={{ width: 28, height: 28, borderRadius: 8, border: "none", background: "#7C3AED44", color: "#A78BFA", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>＋</button>
            </div>
          </div>
        ))}
      </div>

      <button onClick={() => setShowInventoryForm(true)} style={{ ...styles.btn("primary"), width: "100%", padding: 12 }}>
        ＋ 在庫を追加
      </button>
    </div>
  );

  return (
    <div style={styles.app}>
      <div style={styles.header}>
        <div style={styles.row}>
          <div>
            <h1 style={styles.headerTitle}>おうち家計簿</h1>
            <div style={styles.headerSub}>{today.getFullYear()}年{today.getMonth() + 1}月 · {dayOfMonth}日目</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: "#6B7280" }}>今月の総支出</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#A78BFA" }}>¥{fmt(totalSpent + totalFixed)}</div>
          </div>
        </div>
      </div>

      <div style={styles.tabs}>
        {[
          { id: "dashboard", label: "ホーム", icon: "🏠" },
          { id: "balance", label: "残高", icon: "💰" },
          { id: "categories", label: "カテゴリ", icon: "📊" },
          { id: "expenses", label: "履歴", icon: "📋" },
          { id: "inventory", label: "在庫", icon: "📦" },
        ].map(t => (
          <button key={t.id} style={styles.tab(activeTab === t.id)} onClick={() => setActiveTab(t.id)}>
            {t.icon}
            {t.label === "ホーム" && alerts.filter(a => a.level === "danger").length > 0 && <span style={styles.alertBadge}>{alerts.filter(a => a.level === "danger").length}</span>}
            {t.label === "在庫" && alertItems.length > 0 && <span style={styles.alertBadge}>{alertItems.length}</span>}
            <br />{t.label}
          </button>
        ))}
      </div>

      {activeTab === "dashboard" && <Dashboard />}
      {activeTab === "balance" && <Balance />}
      {activeTab === "categories" && <Categories />}
      {activeTab === "expenses" && <Expenses />}
      {activeTab === "inventory" && <Inventory />}

      {(activeTab === "expenses") && (
        <button style={styles.fab} onClick={() => setShowAddForm(!showAddForm)}>
          {showAddForm ? "×" : "+"}
        </button>
      )}

      <div style={styles.bottomNav}>
        {[
          { id: "dashboard", label: "ホーム", icon: "🏠" },
          { id: "balance", label: "残高", icon: "💰" },
          { id: "categories", label: "カテゴリ", icon: "📊" },
          { id: "expenses", label: "履歴", icon: "📋" },
          { id: "inventory", label: "在庫", icon: "📦" },
        ].map(t => (
          <button key={t.id} style={styles.navItem(activeTab === t.id)} onClick={() => setActiveTab(t.id)}>
            <span style={{ fontSize: 20 }}>{t.icon}</span>
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(KakeiboApp));
  </script>
</body>
</html>
