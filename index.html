const today = new Date();
const PERIOD_START_DAY = 16; // 給料日ベース：16日始まり

// 家計期間の計算（16日〜翌月15日）
const currentDay = today.getDate();
// 16日以降なら今月16日が期間開始、15日以前なら先月16日が期間開始
const periodStart = currentDay >= PERIOD_START_DAY
  ? new Date(today.getFullYear(), today.getMonth(), PERIOD_START_DAY)
  : new Date(today.getFullYear(), today.getMonth() - 1, PERIOD_START_DAY);
const periodEnd = new Date(periodStart.getFullYear(), periodStart.getMonth() + 1, 15);
const periodDays = Math.round((periodEnd - periodStart) / (1000 * 60 * 60 * 24)) + 1; // 30日
const dayOfPeriod = Math.round((today - periodStart) / (1000 * 60 * 60 * 24)) + 1;
const remainingDaysInPeriod = periodDays - dayOfPeriod;
const progressRatio = dayOfPeriod / periodDays;

// 後方互換のために残す
const daysInMonth = periodDays;
const dayOfMonth = dayOfPeriod;

function useLocalStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try {
      const saved = localStorage.getItem(key);
      return saved !== null ? JSON.parse(saved) : defaultValue;
    } catch { return defaultValue; }
  });
  const setAndSave = (newVal) => {
    setValue(prev => {
      const resolved = typeof newVal === "function" ? newVal(prev) : newVal;
      try { localStorage.setItem(key, JSON.stringify(resolved)); } catch {}
      return resolved;
    });
  };
  return [value, setAndSave];
}

  const [tempIncomeAmount, setTempIncomeAmount] = useState("");

  const [tempCarryOver, setTempCarryOver] = useState("");
  const [showAddForm, setShowAddForm] = useState(false);
  const [newExpense, setNewExpense] = useState({ category: "food", amount: "", note: "", date: today.toISOString().split("T")[0] });
  const [showInventoryForm, setShowInventoryForm] = useState(false);
  const [newItem, setNewItem] = useState({ name: "", unit: "個", quantity: 1, minAlert: 1, category: "food" });
  const [showBudgetEdit, setShowBudgetEdit] = useState(false);
  const [editingBalance, setEditingBalance] = useState(null);
  const [tempBalance, setTempBalance] = useState("");
  const [receiptMode, setReceiptMode] = useState(false);
  const [receiptImage, setReceiptImage] = useState(null);
  const [receiptScanning, setReceiptScanning] = useState(false);
  const [receiptResults, setReceiptResults] = useState([]);
  const [receiptError, setReceiptError] = useState("");

  const scanReceipt = async (imageBase64) => {
    setReceiptScanning(true);
    setReceiptError("");
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: "image/jpeg", data: imageBase64 }
              },
              {
                type: "text",
                text: `このレシートを読み取って、購入品目ごとに以下のカテゴリに分類してください。
カテゴリ一覧: food(食費), daily(日用品), transport(交通費), utility(光熱費), entertainment(娯楽), health(医療・健康), other(その他)

必ずJSON配列のみで返してください。説明文や\`\`\`は不要です。
形式: [{"note":"品名","amount":金額,"category":"カテゴリID"},...]
レシートの合計金額ではなく、各品目を個別に返してください。`
              }
            ]
          }]
        })
      });
      const data = await response.json();
      const text = data.content?.[0]?.text || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const items = JSON.parse(clean);
      setReceiptResults(items.map((item, i) => ({
        ...item,
        id: Date.now() + i,
        date: today.toISOString().split("T")[0],
        selected: true,
      })));
    } catch (e) {
      setReceiptError("読み取りに失敗しました。レシートをもっと明るく・まっすぐ撮影してもう一度お試しください。");
    }
    setReceiptScanning(false);
  };

  const handleReceiptImage = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const base64 = ev.target.result.split(",")[1];
      setReceiptImage(ev.target.result);
      scanReceipt(base64);
    };
    reader.readAsDataURL(file);
  };

  const addReceiptExpenses = () => {
    const selected = receiptResults.filter(r => r.selected);
    setExpenses([...expenses, ...selected.map(r => ({ id: r.id, date: r.date, category: r.category, amount: r.amount, note: r.note }))]);
    setReceiptResults([]);
    setReceiptImage(null);
    setReceiptMode(false);
  };

  const totalSpent = expenses.reduce((s, e) => s + e.amount, 0);
  const totalBudget = Object.values(budgets).reduce((s, v) => s + v, 0);
  const totalFixed = fixedExpenses.reduce((s, f) => s + f.amount, 0);
  const unpaidFixed = fixedExpenses.filter(f => !f.isPaid).reduce((s, f) => s + f.amount, 0);
  const paidFixed = fixedExpenses.filter(f => f.isPaid).reduce((s, f) => s + f.amount, 0);

  // 収入合計
  const totalIncome = incomes.reduce((s, i) => s + i.amount, 0);
  const totalIncomeReceived = incomes.filter(i => i.isReceived).reduce((s, i) => s + i.amount, 0);

  // 貯金シミュレーション定数
  const MONTHLY_INCOME_SELF = incomes.find(i => i.id === 1)?.amount || 200000;
  const MONTHLY_INCOME_FOOD = incomes.find(i => i.id === 2)?.amount || 96000;
  const MONTHLY_INCOME = totalIncome;

  const MONTHS_LEFT = 12 - today.getMonth();
  const monthlySavingsNeeded = Math.ceil(SAVINGS_GOAL / MONTHS_LEFT);
  const totalMonthlyOut = totalFixed + totalBudget;
  const monthlySurplus = MONTHLY_INCOME + carryOver - totalMonthlyOut;

  const spentByCategory = Object.fromEntries(
    CATEGORIES.map(c => [c.id, expenses.filter(e => e.category === c.id).reduce((s, e) => s + e.amount, 0)])

  const dailyAvg = dayOfMonth > 0 ? totalSpent / dayOfMonth : 0;
  const projectedTotal = dailyAvg * daysInMonth;
  const remainingDays = remainingDaysInPeriod;
  const remainingBudget = totalBudget - totalSpent;

  // 残高ベースで計算

  const unpaidThisPeriod = fixedExpenses
    .filter(f => !f.isPaid && f.dueDay >= today.getDate())
    .reduce((s, f) => s + f.amount, 0);
  // 残高から未払い分を引いた実質使える金額
  const realAvailable = totalBalance - unpaidThisPeriod;
  // 1日あたり使える金額（残高ベース）
  const todayBudget = remainingDays > 0 ? Math.floor(realAvailable / remainingDays) : realAvailable;
  const LOW_BALANCE_THRESHOLD = 30000;

  const alertItems = inventory.filter(i => i.quantity <= i.minAlert);

  const spentByCategory2 = Object.fromEntries(
    CATEGORIES.map(c => [c.id, expenses.filter(e => e.category === c.id).reduce((s, e) => s + e.amount, 0)])
  );

  const alerts = [];
  if (totalSpent > totalBudget) {

    alerts.push({ level: "warn", icon: "⚠️", msg: `変動費が予算の${Math.round(totalSpent/totalBudget*100)}%に達しています` });
  }
  if (projectedTotal > totalBudget) {
    alerts.push({ level: "warn", icon: "📈", msg: `このペースだと月末に¥${Math.round(projectedTotal - totalBudget).toLocaleString("ja-JP")}超過の見込み` });
  }
  CATEGORIES.forEach(cat => {
    const spent = spentByCategory2[cat.id] || 0;
    const budget = budgets[cat.id];
    if (spent > budget) {
      alerts.push({ level: "danger", icon: cat.icon, msg: `${cat.label}が予算オーバー（¥${(spent - budget).toLocaleString("ja-JP")}超過）` });
    } else if (spent > budget * 0.8) {
      alerts.push({ level: "warn", icon: cat.icon, msg: `${cat.label}が予算の${Math.round(spent/budget*100)}%です` });
    }
  });
  if (totalBalance > 0 && totalBalance < LOW_BALANCE_THRESHOLD) {
    alerts.push({ level: "danger", icon: "💸", msg: `総残高¥${totalBalance.toLocaleString("ja-JP")}が少なくなっています！` });
  }
  fixedExpenses.filter(f => !f.isPaid && f.dueDay >= dayOfMonth && f.dueDay <= dayOfMonth + 3).forEach(f => {
    alerts.push({ level: "warn", icon: "📅", msg: `${f.name}（¥${f.amount.toLocaleString("ja-JP")}）の支払い期日は${f.dueDay}日です！` });

  alertItems.forEach(item => {

  const addFixed = () => {

  // 16〜30 → 当月の日付、31以降 → 翌月(31→1日, 32→2日...)

    progressFill: (ratio, color = "#7C3AED") => ({

              <div style={{ fontSize: 11, color: "#6B7280" }}>アラート: {item.minAlert}{item.unit}以下</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button onClick={() => updateInventory(item.id, -1)} style={{ width: 28, height: 28, borderRadius: 8, border: "none", background: "#2A2D3E", color: "#E8E8F0", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
              <span style={{ fontSize: 16, fontWeight: 700, minWidth: 40, textAlign: "center", color: item.quantity <= item.minAlert ? "#EF4444" : "#E8E8F0" }}>
                {item.quantity}{item.unit}
              </span>
              <button onClick={() => updateInventory(item.id, 1)} style={{ width: 28, height: 28, borderRadius: 8, border: "none", background: "#7C3AED44", color: "#A78BFA", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>＋</button>
            </div>
          </div>
        ))}
      </div>

      <button onClick={() => setShowInventoryForm(true)} style={{ ...styles.btn("primary"), width: "100%", padding: 12 }}>
        ＋ 在庫を追加
      </button>
    </div>
  );

  return (
    <div style={styles.app}>

      {/* 収入編集モーダル */}
      {editingIncome && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#00000088", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: "#1A1D2E", borderRadius: 16, padding: 20, width: "100%", maxWidth: 380, border: "1px solid #2A2D3E" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#E8E8F0", marginBottom: 12 }}>✏️ 収入を編集</div>
            <input
              type="text"
              placeholder="収入名"
              value={tempIncomeName}
              onChange={e => setTempIncomeName(e.target.value)}
              style={styles.input}
            />
            <input
              type="number"
              placeholder="金額（例：210000）"
              value={tempIncomeAmount}
              onChange={e => setTempIncomeAmount(e.target.value)}
              style={styles.input}
              autoFocus
            />
            <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
              <button onClick={() => {
                setIncomes(incomes.map(i => i.id === editingIncome.id
                  ? { ...i, name: tempIncomeName, amount: parseInt(tempIncomeAmount) || 0 }
                  : i
                ));
                setEditingIncome(null);
              }} style={{ ...styles.btn("primary"), flex: 1 }}>保存</button>
              <button onClick={() => {
                setIncomes(incomes.filter(i => i.id !== editingIncome.id));
                setEditingIncome(null);
              }} style={{ ...styles.btn("danger"), flex: 1 }}>削除</button>
              <button onClick={() => setEditingIncome(null)}
                style={{ ...styles.btn("secondary"), flex: 1 }}>キャンセル</button>
            </div>
          </div>
        </div>
      )}

      {/* 収入追加モーダル */}
      {showIncomeForm && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#00000088", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: "#1A1D2E", borderRadius: 16, padding: 20, width: "100%", maxWidth: 380, border: "1px solid #2A2D3E" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#E8E8F0", marginBottom: 12 }}>➕ 収入を追加</div>
            <input
              type="text"
              placeholder="収入名（例：副業収入）"
              value={newIncome.name}
              onChange={e => setNewIncome(prev => ({...prev, name: e.target.value}))}
              style={styles.input}
              autoFocus
            />
            <input
              type="number"
              placeholder="金額"
              value={newIncome.amount}
              onChange={e => setNewIncome(prev => ({...prev, amount: e.target.value}))}
              style={styles.input}
            />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => {
                if (!newIncome.name || !newIncome.amount) return;
                setIncomes(prev => [...prev, { id: Date.now(), name: newIncome.name, amount: parseInt(newIncome.amount), isReceived: false }]);
                setNewIncome({ name: "", amount: "" });
                setShowIncomeForm(false);
              }} style={{ ...styles.btn("primary"), flex: 1 }}>追加</button>
              <button onClick={() => { setShowIncomeForm(false); setNewIncome({ name: "", amount: "" }); }}
                style={{ ...styles.btn("secondary"), flex: 1 }}>キャンセル</button>
            </div>
          </div>
        </div>
      )}

      <div style={styles.header}>
        <div style={styles.row}>
          <div>
            <h1 style={styles.headerTitle}>おうち家計簿</h1>
            <div style={styles.headerSub}>{periodLabel} · {dayOfPeriod}日目</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 11, color: "#6B7280" }}>今月の総支出</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#A78BFA" }}>¥{fmt(totalSpent + totalFixed)}</div>
          </div>
        </div>
      </div>

      <div style={styles.tabs}>
        {[
          { id: "dashboard", label: "ホーム", icon: "🏠" },
          { id: "balance", label: "残高", icon: "💰" },
          { id: "planned", label: "予定", icon: "📅" },
          { id: "expenses", label: "履歴", icon: "📋" },
          { id: "inventory", label: "在庫", icon: "📦" },
        ].map(t => (
          <button key={t.id} style={styles.tab(activeTab === t.id)} onClick={() => setActiveTab(t.id)}>
            {t.icon}
            {t.label === "ホーム" && alerts.filter(a => a.level === "danger").length > 0 && <span style={styles.alertBadge}>{alerts.filter(a => a.level === "danger").length}</span>}
            {t.label === "在庫" && alertItems.length > 0 && <span style={styles.alertBadge}>{alertItems.length}</span>}
            <br />{t.label}
          </button>
        ))}
      </div>

      {activeTab === "dashboard" && <Dashboard />}
      {activeTab === "balance" && <Balance />}
      {activeTab === "planned" && <Planned />}
      {activeTab === "categories" && <Categories />}
      {activeTab === "expenses" && <Expenses />}
      {activeTab === "inventory" && <Inventory />}

      {(activeTab === "expenses") && (
        <button style={styles.fab} onClick={() => setShowAddForm(!showAddForm)}>
          {showAddForm ? "×" : "+"}
        </button>
      )}

      <div style={styles.bottomNav}>
        {[
          { id: "dashboard", label: "ホーム", icon: "🏠" },
          { id: "balance", label: "残高", icon: "💰" },
          { id: "planned", label: "予定", icon: "📅" },
          { id: "expenses", label: "履歴", icon: "📋" },
          { id: "inventory", label: "在庫", icon: "📦" },
        ].map(t => (
          <button key={t.id} style={styles.navItem(activeTab === t.id)} onClick={() => setActiveTab(t.id)}>
            <span style={{ fontSize: 20 }}>{t.icon}</span>
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(KakeiboApp));
</script>
</body>
</html>
